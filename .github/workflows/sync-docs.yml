name: Sync docs to Maven dataset

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.md'
      - 'docs/**/*.mdx'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out docs repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run sync script
        run: node scripts/sync-docs.js

      - name: Upload dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: maven-dataset
          path: maven-dataset.json
