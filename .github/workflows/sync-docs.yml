name: Sync docs to Maven dataset

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.md'
      - 'docs/**/*.mdx'
      - 'scripts/**/*.js'
      - '.github/workflows/sync-docs.yml'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out docs repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Maven dataset JSON
        run: node scripts/sync-docs.js

      - name: Upload dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: maven-dataset
          path: maven-dataset.json

      - name: Sync dataset to Google Doc
        run: node scripts/sync-docs-to-gdoc.js
        env:
          GOOGLE_DOC_WEBAPP_URL: ${{ secrets.GOOGLE_DOC_WEBAPP_URL }}
          GOOGLE_DOC_SYNC_SECRET: ${{ secrets.GOOGLE_DOC_SYNC_SECRET }}
